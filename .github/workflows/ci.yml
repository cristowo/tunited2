name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, auth-service, main-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        # auth-service aún no tiene suite propia
        if: matrix.service != 'auth-service'
        run: npm test

      - name: Auditoría de dependencias (solo high+)
        run: npm audit --audit-level=high

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck + build
        run: npm run build

      - name: Auditoría de dependencias (solo high+)
        run: npm audit --audit-level=high
